# MochaJuice - small mods on top of Catppuccin Mocha

$activeBorderColor = rgb(89b4fa)

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    col.active_border = $activeBorderColor
    # No gaps between windows or borders
    gaps_in = 2
    gaps_out = 4
    border_size = 1
}

group {
    col.border_active = $activeBorderColor
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 8
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true
    # Slide workspaces left/right (overrides Omarchy's disabled default)
    animation = workspaces, 1, 4, easeOutQuint, slide
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    #single_window_aspect_ratio = 1 1
}

# Three-finger horizontal swipe → workspace switch
gesture = 3, horizontal, workspace

# Make the swipe commit sooner (default cancel_ratio is 0.5)
gestures {
    workspace_swipe_cancel_ratio = 0.25
}

# Float Nextcloud desktop client (prevents auto-close on focus loss when tiled)
windowrule = float on, match:class ^(com\.nextcloud\.desktopclient\.nextcloud|Nextcloud|nextcloud)$
windowrule = center on, match:class ^(com\.nextcloud\.desktopclient\.nextcloud|Nextcloud|nextcloud)$
windowrule = pin on, match:class ^(com\.nextcloud\.desktopclient\.nextcloud|Nextcloud|nextcloud)$
windowrule = stay_focused on, match:class ^(com\.nextcloud\.desktopclient\.nextcloud|Nextcloud|nextcloud)$
